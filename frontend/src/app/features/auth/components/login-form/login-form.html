<form [formGroup]="form" (submit)="onSubmit()" class="space-y-4">
  @if (error()) {
    <div class="bg-red-50 text-red-600 p-3 rounded text-sm">
      {{ error() }}
    </div>
  }

  <div>
    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      [class.border-red-500]="form.get('email')?.invalid && form.get('email')?.touched"
    />
    @if (form.get('email')?.invalid && form.get('email')?.touched) {
      <p class="text-red-500 text-xs mt-1">Email inválido</p>
    }
  </div>

  <div>
    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      [class.border-red-500]="form.get('password')?.invalid && form.get('password')?.touched"
    />
    @if (form.get('password')?.invalid && form.get('password')?.touched) {
      <p class="text-red-500 text-xs mt-1">Mínimo 6 caracteres</p>
    }
  </div>

  <button
    type="submit"
    [disabled]="loading()"
    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
  >
    {{ loading() ? 'Iniciando sesión...' : 'Iniciar sesión' }}
  </button>
</form>
