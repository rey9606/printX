services:
  postgres:
    image: postgres:latest
    container_name: printx_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-printx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-printx123}
      POSTGRES_DB: ${POSTGRES_DB:-printx}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-printx}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6.2-alpine
    container_name: printx_redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
